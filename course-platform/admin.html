<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 课程资源平台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;--secondary:#7c3aed;--success:#10b981;--danger:#ef4444;--bg:#f1f5f9;--surface:#fff;--text:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 10px 40px rgba(0,0,0,.12);--radius:12px;--radius-sm:8px;--radius-xs:5px;}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}

/* ===== LOGIN ===== */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 40%,var(--secondary) 100%)}
.login-card{background:var(--surface);border-radius:20px;padding:44px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.login-card .login-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin:0 auto 20px}
.login-card h1{font-size:24px;font-weight:800;text-align:center;margin-bottom:6px}
.login-card p{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:32px}
.login-card label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
.login-card input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:14px;outline:none;transition:border .2s;margin-bottom:16px;background:#fff}
.login-card input:focus{border-color:var(--primary)}
.login-card button{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border:none;border-radius:var(--radius-xs);font-size:15px;font-weight:700;cursor:pointer;transition:box-shadow .2s}
.login-card button:hover{box-shadow:0 6px 20px rgba(37,99,235,.4)}
.login-card .error{color:var(--danger);font-size:13px;text-align:center;margin-bottom:12px;min-height:18px}
.login-card .back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--text-muted)}
.login-card .back-link:hover{color:var(--primary)}

/* ===== ADMIN LAYOUT ===== */
.admin-layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.sidebar-logo .logo-text{font-size:15px;font-weight:800;color:var(--text)}
.sidebar-logo .logo-text span{display:block;font-size:11px;color:var(--text-muted);font-weight:400;margin-top:1px}

.sidebar-nav{flex:1;padding:12px 10px}
.nav-section{margin-bottom:2px}
.nav-section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;padding:8px 12px 4px;display:flex;align-items:center;gap:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .2s;position:relative}
.nav-item:hover{background:#f1f5f9;color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--primary);border-radius:0 2px 2px 0}
.nav-item i{font-size:14px;width:18px;text-align:center}
.nav-item .badge{background:#f1f5f9;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:auto}
.nav-item.active .badge{background:var(--primary);color:#fff}

.sidebar-bottom{padding:16px 20px;border-top:1px solid var(--border)}
.sidebar-bottom .user-info{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);margin-bottom:8px}
.sidebar-bottom .user-info i{color:var(--text-muted)}
.sidebar-bottom .logout{font-size:13px;color:var(--danger);cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.sidebar-bottom .front-link{display:block;margin-top:10px;font-size:12px;color:var(--text-muted);transition:color .2s}
.sidebar-bottom .front-link:hover{color:var(--primary)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px}
.topbar-title i{color:var(--primary);font-size:15px}
.topbar-actions{display:flex;gap:8px}

.content{padding:24px 28px;flex:1}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 18px;border-radius:24px;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,99,235,.35)}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text-secondary)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-ghost{padding:8px 14px;color:var(--text-secondary);font-size:13px;font-weight:500}
.btn-ghost:hover{color:var(--primary);background:var(--primary-light)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:20px}
.btn-danger-outline{background:#fff;border:1.5px solid #fecaca;color:var(--danger)}
.btn-danger-outline:hover{background:#fef2f2}

/* Filter bar */
.filter-bar{background:var(--surface);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;box-shadow:var(--shadow);border:1px solid var(--border)}
.filter-bar select,.filter-bar input{padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;outline:none;background:#fff;color:var(--text);transition:border .2s}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--primary)}
.filter-bar .count{margin-left:auto;font-size:13px;color:var(--text-muted)}
.filter-bar .count b{color:var(--primary);font-weight:700}

/* Table */
.data-table{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.data-table table{width:100%;border-collapse:collapse}
.data-table th{background:#f8fafc;padding:12px 16px;text-align:left;font-size:12px;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
.data-table td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#f8fafc}
.cell-name{max-width:200px}
.cell-name .name{font-weight:600}
.cell-name .sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.cell-url{max-width:120px}
.cell-url a{color:var(--primary);font-size:12px;word-break:break-all}
.cell-url .empty{color:var(--text-muted);font-size:12px}
.actions{display:flex;gap:5px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-header{padding:22px 24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
.modal-header h2 i{color:var(--primary)}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;font-size:16px;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{padding:20px 24px}
.modal-body label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
.modal-body input,.modal-body select,.modal-body textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;outline:none;resize:vertical;font-family:inherit;background:#fff;color:var(--text);transition:border .2s;margin-bottom:14px}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{border-color:var(--primary)}
.modal-body textarea{min-height:72px}
.modal-body .hint{font-size:11px;color:var(--text-muted);margin-top:-10px;margin-bottom:14px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:18px 24px 20px;border-top:1px solid var(--border)}
.modal-save{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border:none;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;transition:box-shadow .2s}
.modal-save:hover{box-shadow:0 4px 14px rgba(37,99,235,.35)}
.modal-cancel{background:#fff;border:1.5px solid var(--border);padding:10px 20px;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-secondary);transition:all .2s}
.modal-cancel:hover{background:#f1f5f9}

/* Empty state */
.empty-state{text-align:center;padding:60px 24px;color:var(--text-muted)}
.empty-state i{font-size:40px;opacity:.3;display:block;margin-bottom:10px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:2000;box-shadow:var(--shadow-lg);display:none;gap:8px;align-items:center}
.toast::before{font-family:'Font Awesome 6 Free';content:'\f00c'}
.toast.error{background:var(--danger)}
.toast.error::before{content:'\f00d'}
.toast.success::before{content:'\f00c'}
.toast{display:flex!important}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar-logo .logo-text,.nav-section-title,.nav-item span,.sidebar-bottom .user-info,.sidebar-bottom .logout span,.sidebar-bottom .front-link span{display:none}
  .filter-bar{flex-direction:column;align-items:stretch}
  .data-table{overflow-x:auto}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let token = sessionStorage.getItem('admin_token') || '';
let username = sessionStorage.getItem('admin_username') || '';
let state = {
  tab: 'courses',
  collegeFilter: 0,
  majorFilter: 0,
  colleges: [],
  majors: [],
  courses: [],
  total: 0
};

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg, type='success'){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  t.style.display='flex';
  setTimeout(()=>t.style.display='none', 3000);
}

async function api(url, method='GET', body=null){
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(token) opts.headers['Authorization'] = 'Bearer ' + token;
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(API + url, opts);
  if(res.status===401){ logout(); throw new Error('未授权'); }
  if(!res.ok){ const e=await res.json(); throw new Error(e.error||'请求失败'); }
  return res.json();
}

function render(){ document.getElementById('app').innerHTML = token ? tplAdmin() : tplLogin(); }

function tplLogin(){
  return `<div class="login-page"><div class="login-card">
    <div class="login-icon"><i class="fa-solid fa-gear"></i></div>
    <h1>课程管理后台</h1>
    <p>请输入管理员账号密码登录</p>
    <div class="error" id="login-error"></div>
    <input type="text" id="login-user" placeholder="用户名" autocomplete="username">
    <input type="password" id="login-pass" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> 登 录</button>
    <a class="back-link" href="/"><i class="fa-solid fa-arrow-left"></i> 返回前台</a>
  </div></div>`;
}

function tplAdmin(){
  return `<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
      <div class="logo-text">课程管理<span>管理后台</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title"><i class="fa-solid fa-folder-open"></i> 数据管理</div>
        <div class="nav-item ${state.tab==='courses'?'active':''}" onclick="switchTab('courses')">
          <i class="fa-solid fa-video"></i><span>课程管理</span>
          <span class="badge" id="badge-courses">${state.total}</span>
        </div>
        <div class="nav-item ${state.tab==='majors'?'active':''}" onclick="switchTab('majors')">
          <i class="fa-solid fa-list-check"></i><span>专业管理</span>
          <span class="badge" id="badge-majors">${state.majors.length}</span>
        </div>
        <div class="nav-item ${state.tab==='colleges'?'active':''}" onclick="switchTab('colleges')">
          <i class="fa-solid fa-building-columns"></i><span>学院管理</span>
          <span class="badge" id="badge-colleges">${state.colleges.length}</span>
        </div>
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-info"><i class="fa-solid fa-user"></i> ${escHtml(username)}</div>
      <div class="logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> 退出登录</div>
      <a class="front-link" href="/"><i class="fa-solid fa-arrow-left"></i> <span>返回前台</span></a>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title"><i class="fa-solid fa-video"></i> 课程管理</div>
      <div class="topbar-actions" id="topbar-actions">
        <button class="btn btn-primary" onclick="openAdd()"><i class="fa-solid fa-plus"></i> 新增</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>`;
}

function switchTab(tab){
  state.tab = tab; state.collegeFilter = 0; state.majorFilter = 0;
  render(); loadData();
}

async function doLogin(){
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if(!u||!p){ document.getElementById('login-error').textContent='请输入用户名和密码'; return; }
  try {
    const res = await api('/login', 'POST', {username:u, password:p});
    token = res.token; username = res.username;
    sessionStorage.setItem('admin_token', token);
    sessionStorage.setItem('admin_username', username);
    render(); await loadData();
  } catch(e){ document.getElementById('login-error').textContent = e.message||'登录失败'; }
}
function logout(){ token=''; sessionStorage.clear(); render(); }

async function loadData(){
  try {
    const [colleges, majors, courses] = await Promise.all([
      api('/admin/colleges'), api('/admin/majors'), api('/admin/courses')
    ]);
    state.colleges = colleges;
    state.majors = majors;
    state.courses = courses;
    state.total = courses.length;
    render();
    document.getElementById('badge-courses').textContent = state.total;
    document.getElementById('badge-majors').textContent = state.majors.length;
    document.getElementById('badge-colleges').textContent = state.colleges.length;
    renderContent();
  } catch(e){ toast(e.message, 'error'); }
}

function renderContent(){
  const content = document.getElementById('content');
  document.getElementById('topbar-title').innerHTML =
    state.tab==='courses' ? '<i class="fa-solid fa-video"></i> 课程管理' :
    state.tab==='majors' ? '<i class="fa-solid fa-list-check"></i> 专业管理' :
    '<i class="fa-solid fa-building-columns"></i> 学院管理';
  document.getElementById('topbar-actions').innerHTML = state.tab==='courses'
    ? `<button class="btn btn-primary" onclick="openAdd()"><i class="fa-solid fa-plus"></i> 新增课程</button>`
    : state.tab==='majors'
    ? `<button class="btn btn-primary" onclick="openAddMajor()"><i class="fa-solid fa-plus"></i> 新增专业</button>`
    : `<button class="btn btn-primary" onclick="openAddCollege()"><i class="fa-solid fa-plus"></i> 新增学院</button>`;

  if(state.tab==='courses') renderCourses(content);
  else if(state.tab==='majors') renderMajors(content);
  else renderColleges(content);
}

function renderColleges(content){
  if(state.colleges.length===0){
    content.innerHTML=`<div class="empty-state"><i class="fa-solid fa-building-columns"></i><p>暂无学院数据</p></div>`; return;
  }
  content.innerHTML=`<div class="data-table"><table>
    <thead><tr><th><i class="fa-solid fa-hashtag"></i> ID</th><th>学院名称</th><th><i class="fa-solid fa-list-check"></i> 专业数</th><th><i class="fa-solid fa-video"></i> 课程数</th><th><i class="fa-solid fa-wrench"></i> 操作</th></tr></thead>
    <tbody>${state.colleges.map(c=>`<tr>
      <td><b>${c.id}</b></td>
      <td class="cell-name"><div class="name">${escHtml(c.name)}</div></td>
      <td><b>${c.major_count}</b></td>
      <td><b>${c.course_count}</b></td>
      <td class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditCollege(${c.id},'${escHtml(c.name)}')"><i class="fa-solid fa-pen"></i> 编辑</button>
        <button class="btn btn-danger-outline btn-sm" onclick="deleteCollege(${c.id},'${escHtml(c.name)}')"><i class="fa-solid fa-trash"></i> 删除</button>
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderMajors(content){
  if(state.majors.length===0){
    content.innerHTML=`<div class="empty-state"><i class="fa-solid fa-list-check"></i><p>暂无专业数据</p></div>`; return;
  }
  content.innerHTML=`<div class="data-table"><table>
    <thead><tr><th><i class="fa-solid fa-hashtag"></i> ID</th><th>专业方向</th><th>所属学院</th><th><i class="fa-solid fa-video"></i> 课程数</th><th><i class="fa-solid fa-wrench"></i> 操作</th></tr></thead>
    <tbody>${state.majors.map(m=>`<tr>
      <td><b>${m.id}</b></td>
      <td class="cell-name"><div class="name">${escHtml(m.name)}</div></td>
      <td><span style="color:var(--primary);font-weight:600">${escHtml(m.college_name)}</span></td>
      <td><b>${m.course_count}</b></td>
      <td class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditMajor(${m.id},'${escHtml(m.name)}',${m.college_id})"><i class="fa-solid fa-pen"></i> 编辑</button>
        <button class="btn btn-danger-outline btn-sm" onclick="deleteMajor(${m.id})"><i class="fa-solid fa-trash"></i> 删除</button>
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderCourses(content){
  const collegeFilter = `<select id="f-college" onchange="onCollegeFilter()">
    <option value="0">全部学院</option>
    ${state.colleges.map(c=>`<option value="${c.id}" ${state.collegeFilter==c.id?'selected':''}>${escHtml(c.name)}</option>`).join('')}
  </select>`;
  const majorFilter = `<select id="f-major" onchange="onMajorFilter()">
    <option value="0">全部专业</option>
    ${state.majors.map(m=>`<option value="${m.id}" ${state.majorFilter==m.id?'selected':''}>${escHtml(m.name)}</option>`).join('')}
  </select>`;
  content.innerHTML=`
  <div class="filter-bar">
    ${collegeFilter}
    ${majorFilter}
    <input type="text" id="f-search" placeholder="搜索课程名..." style="flex:1;max-width:200px">
    <button class="btn btn-outline btn-sm" onclick="doSearch()"><i class="fa-solid fa-search"></i> 搜索</button>
    <div class="count">共 <b>${state.total}</b> 门课程</div>
  </div>
  <div class="data-table"><table>
    <thead><tr><th><i class="fa-solid fa-hashtag"></i> ID</th><th>课程名称</th><th>学院</th><th>专业</th><th><i class="fa-solid fa-globe"></i> 线上</th><th><i class="fa-solid fa-school"></i> 线下</th><th><i class="fa-solid fa-wrench"></i> 操作</th></tr></thead>

function onCollegeFilter(){

}
function onMajorFilter(){
  state.collegeFilter = parseInt(document.getElementById('f-college')?.value||0);
  state.majorFilter = parseInt(document.getElementById('f-major')?.value||0);
  filterCourses();
}
function filterCourses(){
  let f = state.courses;
  if(state.collegeFilter>0) f=f.filter(c=>c.college_id==state.collegeFilter);
  if(state.majorFilter>0) f=f.filter(c=>c.major_id==state.majorFilter);
  renderCourseTable(f);
}
function doSearch(){
  const q = document.getElementById('f-search')?.value.trim().toLowerCase();
  if(!q) return renderCourseTable(state.courses);
  renderCourseTable(state.courses.filter(c=>c.name.toLowerCase().includes(q)));
}

// ===== MODAL =====

function closeModal(){
  const m=document.getElementById('modal-overlay'); if(m) m.remove();
}
function openModal(html){
  const old=document.getElementById('modal-overlay'); if(old) old.remove();
  const m=document.createElement('div'); m.id='modal-overlay'; m.className='modal-overlay';
  m.innerHTML=html; m.addEventListener('click', e=>{ if(e.target===m) closeModal(); });
  document.body.appendChild(m);
}

}

function onCollegeChangeForAdd(){
  const collegeId = parseInt(document.getElementById('m-college')?.value||0);
  const majorSelect = document.getElementById('m-major');
  if(!majorSelect) return;
  const collegeMajors = state.majors.filter(m=>m.college_id===collegeId);
  majorSelect.innerHTML = collegeMajors.length
    ? collegeMajors.map(m=>`<option value="${m.id}">${escHtml(m.name)}</option>`).join('')
    : '<option value="0">该学院无专业</option>';
}

async function submitAddCourse(){
  const name = document.getElementById('m-name').value.trim();
  const college_id = parseInt(document.getElementById('m-college').value);
  const major_id = parseInt(document.getElementById('m-major').value);
  if(!name){ toast('请输入课程名称', 'error'); return; }
  try {
    await api('/admin/courses', 'POST', {
      name, college_id, major_id,
      image_url: document.getElementById('m-img').value.trim(),
      description: document.getElementById('m-desc').value.trim(),
      online_url: document.getElementById('m-online').value.trim(),
      offline_url: document.getElementById('m-offline').value.trim()
    });
    toast('课程添加成功'); closeModal(); await loadData();
  } catch(e){ toast(e.message, 'error'); }
}

function openEditCourse(id){
  const c = state.courses.find(x=>x.id===id);
  if(!c) return;
  openModal(`<div class="modal"><div class="modal-header"><h2><i class="fa-solid fa-video"></i> 编辑课程</h2><button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div>
  <div class="modal-body">
    <label>课程名称</label>
    <input id="m-name" value="${escHtml(c.name)}" readonly style="background:#f1f5f9">
    <label>课程图片URL</label>
    <input id="m-img" value="${escHtml(c.image_url||'')}" placeholder="https://...">
    <label>课程简介</label>
    <textarea id="m-desc" placeholder="简要描述课程内容...">${escHtml(c.description||'')}</textarea>
    <label>线上课程地址</label>
    <input id="m-online" value="${escHtml(c.online_url||'')}" placeholder="https://...">
    <label>线下课程地址</label>
    <input id="m-offline" value="${escHtml(c.offline_url||'')}" placeholder="https://...">
  </div>
  <div class="modal-footer">
    <button class="modal-cancel" onclick="closeModal()">取消</button>
    <button class="modal-save" onclick="submitEditCourse(${id})"><i class="fa-solid fa-check"></i> 保存</button>
  </div></div>`);
}

async function submitEditCourse(id){
  try {
    await api(`/admin/courses/${id}`, 'PUT', {
      image_url: document.getElementById('m-img').value.trim(),
      description: document.getElementById('m-desc').value.trim(),
      online_url: document.getElementById('m-online').value.trim(),
      offline_url: document.getElementById('m-offline').value.trim()
    });
    toast('课程更新成功'); closeModal(); await loadData();
  } catch(e){ toast(e.message, 'error'); }
}

async function deleteCourse(id){
  if(!confirm('确定删除该课程吗？')) return;
  try { await api(`/admin/courses/${id}`, 'DELETE'); toast('删除成功'); await loadData(); }
  catch(e){ toast(e.message, 'error'); }
}

// Init
render();
if(token){ loadData(); }
</script>
</body>
</html>
