<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产业学院课程资源平台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--midnight:#0f172a;--midnight-light:#1e293b;--gold:#d4a853;--gold-light:#f5e6c8;--gold-dark:#b8922e;--cream:#faf8f5;--cream-dark:#f0ece4;--charcoal:#1e1e1e;--slate:#64748b;--muted:#94a3b8;--shadow-sm:0 2px 8px rgba(15,23,42,.06);--shadow-md:0 8px 24px rgba(15,23,42,.1);--shadow-lg:0 16px 48px rgba(15,23,42,.15);--shadow-gold:0 4px 20px rgba(212,168,83,.25);--r:4px;--r-md:8px;--r-lg:16px}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--cream);color:var(--charcoal);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 0% 0%,rgba(212,168,83,.04) 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,rgba(15,23,42,.03) 0%,transparent 50%);pointer-events:none;z-index:0;opacity:.7}
.page-wrapper{position:relative;z-index:1}
a{text-decoration:none;color:inherit}
button{border:none;cursor:pointer;font-family:inherit;background:none}

/* HEADER */
.site-header{position:sticky;top:0;z-index:100;background:rgba(250,248,245,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(212,168,83,.2)}
.header-inner{max-width:1280px;margin:0 auto;padding:0 48px;height:72px;display:flex;align-items:center;gap:40px}
.brand{display:flex;align-items:center;gap:14px;flex-shrink:0}
.brand-icon{width:44px;height:44px;background:var(--midnight);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--gold);position:relative;box-shadow:var(--shadow-sm)}
.brand-icon::after{content:'';position:absolute;inset:-2px;border:1px solid rgba(212,168,83,.3);border-radius:calc(var(--r) + 2px)}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--midnight)}
.brand-name span{display:block;font-size:11px;color:var(--slate);font-weight:400;font-family:'Noto Sans SC',sans-serif;letter-spacing:.5px}
.header-nav{display:flex;gap:4px;flex:1}
.header-nav a{padding:8px 20px;border-radius:var(--r);font-size:14px;font-weight:500;color:var(--slate);transition:all .25s;position:relative}
.header-nav a::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--gold);transition:width .25s}
.header-nav a:hover{color:var(--midnight)}
.header-nav a:hover::after{width:20px}
.header-nav a.active{color:var(--midnight);font-weight:600}
.header-nav a.active::after{width:24px;background:var(--gold)}
.header-extra{display:flex;align-items:center;gap:12px;margin-left:auto}
.btn{font-size:13px;font-weight:600;padding:9px 20px;border-radius:var(--r);border:1.5px solid rgba(212,168,83,.4);background:transparent;color:var(--midnight);transition:all .25s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--midnight);border-color:var(--midnight);color:#fff;transform:translateY(-1px);box-shadow:var(--shadow-md)}

/* HERO */
.hero{background:var(--midnight);padding:80px 48px 100px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(212,168,83,.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(212,168,83,.08) 0%,transparent 40%);pointer-events:none}
.hero::after{content:'ACADEMIA';position:absolute;right:-40px;top:50%;transform:translateY(-50%);font-family:'Cormorant Garamond',serif;font-size:200px;font-weight:700;color:rgba(255,255,255,.02);letter-spacing:20px;pointer-events:none;white-space:nowrap}
.hero-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:60px;align-items:center;position:relative;z-index:1}
.hero-text{max-width:700px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:24px}
.hero-eyebrow-line{width:40px;height:1px;background:var(--gold)}
.hero-eyebrow span{font-size:12px;font-weight:600;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5vw,64px);font-weight:600;color:#fff;line-height:1.1;margin-bottom:24px}
.hero h1 em{font-style:italic;color:var(--gold);display:block}
.hero-desc{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:40px;max-width:540px;line-height:1.8}
.hero-stats{display:flex;gap:48px}
.hero-stat{display:flex;flex-direction:column;gap:4px;padding-left:20px;border-left:2px solid var(--gold)}
.hero-stat .num{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:600;color:#fff;line-height:1}
.hero-stat .label{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:1px}
.hero-visual{width:280px;height:280px;position:relative}
.hero-visual::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,168,83,.2) 0%,rgba(212,168,83,.05) 100%);border-radius:50%;border:1px solid rgba(212,168,83,.3)}
.hero-visual::after{content:'';position:absolute;inset:-20px;border:1px solid rgba(212,168,83,.1);border-radius:50%}
.hero-visual i{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:100px;color:rgba(212,168,83,.8)}

/* SEARCH */
.search-section{max-width:1280px;margin:-40px auto 0;padding:0 48px;position:relative;z-index:10}
.search-bar{display:flex;background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);overflow:hidden;border:1px solid rgba(212,168,83,.15)}
.search-bar input{flex:1;padding:20px 24px;font-size:15px;border:none;outline:none;background:transparent;color:var(--charcoal)}
.search-bar input::placeholder{color:var(--muted)}
.search-bar button{flex-shrink:0;background:var(--midnight);color:#fff;border:none;padding:20px 32px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;transition:background .25s}
.search-bar button:hover{background:var(--gold-dark)}

/* MAIN */
.page-main{max-width:1280px;margin:0 auto;padding:60px 48px 80px}
.page-section{margin-bottom:72px}

/* SECTION HEADER */
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid rgba(15,23,42,.08)}
.section-label{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--midnight)}
.section-link{font-size:13px;color:var(--slate);display:flex;align-items:center;gap:6px;transition:all .25s}
.section-link:hover{color:var(--gold);gap:10px}

/* COLLEGE GRID */
.college-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:24px}
.college-card{background:#fff;border:1px solid rgba(15,23,42,.06);border-radius:var(--r-lg);padding:32px;transition:all .4s cubic-bezier(.22,.68,0,1.2);position:relative;overflow:hidden}
.college-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold);transform:scaleY(0);transition:transform .4s}
.college-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--midnight) 0%,var(--midnight-light) 100%);opacity:0;transition:opacity .4s;z-index:0}
.college-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:transparent}
.college-card:hover::before{transform:scaleY(1)}
.college-card:hover::after{opacity:.97}
.college-card > *{position:relative;z-index:1}
.college-card:hover .c-top,.college-card:hover h3,.college-card:hover .c-sub,.college-card:hover .c-tag{color:#fff !important}
.college-card:hover .college-icon{background:rgba(255,255,255,.15) !important;color:#fff !important}
.college-card:hover .c-tag{background:rgba(255,255,255,.1) !important}
.c-top{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.college-icon{width:56px;height:56px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;transition:all .4s}
.college-icon.b1{background:linear-gradient(135deg,#dbeafe,#bfdbfe);color:#1d4ed8}
.college-icon.b2{background:linear-gradient(135deg,#f5f3ff,#ede9fe);color:#7c3aed}
.college-icon.b3{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#059669}
.college-icon.b4{background:linear-gradient(135deg,#fff7ed,#fed7aa);color:#ea580c}
.college-icon.b5{background:linear-gradient(135deg,#ecfeff,#cffafe);color:#0891b2}
.college-icon.b6{background:linear-gradient(135deg,#fdf2f8,#fce7f3);color:#db2777}
.college-icon.b7{background:linear-gradient(135deg,#fef9c3,#fef08a);color:#ca8a04}
.college-icon.b8{background:linear-gradient(135deg,#f0fdfa,#ccfbf1);color:#0d948c}
.college-icon.b9{background:linear-gradient(135deg,#fef2f2,#fee2e2);color:#dc2626}
.college-icon.b10{background:linear-gradient(135deg,#f1f5f9,#e2e8f0);color:#475569}
.college-card h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--midnight);margin-bottom:6px;line-height:1.2}
.c-sub{font-size:13px;color:var(--slate);line-height:1.5}
.c-footer{display:flex;gap:12px;margin-top:20px;padding-top:20px;border-top:1px solid rgba(15,23,42,.06)}
.c-tag{font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--r);background:rgba(15,23,42,.04);color:var(--midnight);transition:all .4s}
.c-tag strong{color:var(--gold-dark)}
.c-arrow{margin-left:auto;width:32px;height:32px;border-radius:50%;background:rgba(15,23,42,.04);display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:12px;transition:all .4s}
.college-card:hover .c-arrow{background:rgba(255,255,255,.15);color:#fff;transform:translateX(4px)}

/* MAJOR GRID */
.major-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.major-card{background:#fff;border:1px solid rgba(15,23,42,.06);border-radius:var(--r-md);padding:20px 24px;display:flex;align-items:center;gap:16px;transition:all .3s}
.major-card:hover{border-color:var(--gold);box-shadow:var(--shadow-gold);transform:translateX(4px)}
.m-icon{width:44px;height:44px;border-radius:var(--r);background:linear-gradient(135deg,var(--cream),var(--cream-dark));display:flex;align-items:center;justify-content:center;color:var(--gold-dark);font-size:18px;flex-shrink:0;transition:all .3s}
.major-card:hover .m-icon{background:var(--gold);color:#fff}
.m-info{flex:1;min-width:0}
.m-info h4{font-size:15px;font-weight:600;color:var(--midnight);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.m-count{font-size:12px;color:var(--slate)}
.m-arrow{color:var(--muted);font-size:12px;transition:all .3s}
.major-card:hover .m-arrow{color:var(--gold);transform:translateX(3px)}

/* COURSE LIST */
.course-list{display:flex;flex-direction:column;gap:10px}
.course-item{background:#fff;border:1px solid rgba(15,23,42,.06);border-radius:var(--r-md);padding:16px 24px;display:flex;align-items:center;gap:16px;transition:all .3s}
.course-item:hover{border-color:var(--gold);box-shadow:var(--shadow-gold);transform:translateX(6px)}
.c-num{width:36px;height:36px;border-radius:var(--r);background:var(--cream);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold-dark);flex-shrink:0;border:1px solid rgba(212,168,83,.2)}
.c-info{flex:1;min-width:0}
.c-info h4{font-size:15px;font-weight:600;color:var(--midnight);margin-bottom:3px}
.c-meta{font-size:12px;color:var(--slate);display:flex;gap:12px}
.c-arrow{color:var(--muted);transition:all .3s}
.course-item:hover .c-arrow{color:var(--gold);transform:translateX(3px)}

/* LIST HEADER */
.list-header{margin-bottom:32px}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid rgba(15,23,42,.1);border-radius:var(--r);font-size:13px;font-weight:500;color:var(--slate);background:#fff;transition:all .25s;margin-bottom:16px}
.back-btn:hover{border-color:var(--gold);color:var(--gold-dark)}
.list-header h2{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--midnight);margin-bottom:8px}
.list-header .sub{font-size:14px;color:var(--slate)}
.breadcrumb{font-size:13px;color:var(--slate);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.breadcrumb a{color:var(--slate);transition:color .25s}
.breadcrumb a:hover{color:var(--gold)}
.breadcrumb span{color:var(--gold);font-weight:600}
.breadcrumb i{font-size:10px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;padding:24px;animation:fadeIn .3s ease}
.modal{background:#fff;border-radius:var(--r-lg);width:100%;max-width:520px;box-shadow:var(--shadow-lg);animation:slideUp .35s cubic-bezier(.22,.68,0,1.2);overflow:hidden}
.modal-header{padding:28px 32px 20px;border-bottom:1px solid rgba(15,23,42,.06);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.modal-header h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--midnight);line-height:1.2}
.modal-close{width:36px;height:36px;border-radius:var(--r);background:var(--cream);font-size:16px;color:var(--slate);display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.modal-close:hover{background:var(--midnight);color:#fff}
.modal-body{padding:24px 32px 32px}
.c-img{width:100%;height:180px;border-radius:var(--r-md);overflow:hidden;margin-bottom:20px;background:linear-gradient(135deg,var(--cream),var(--cream-dark));display:flex;align-items:center;justify-content:center;border:1px solid rgba(212,168,83,.15)}
.c-img img{width:100%;height:100%;object-fit:cover}
.c-img .placeholder{font-size:48px;color:rgba(212,168,83,.2)}
.c-tags{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.c-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:var(--r);background:var(--cream);color:var(--midnight)}
.c-tag.blue{background:rgba(212,168,83,.12);color:var(--gold-dark)}
.c-desc{font-size:14px;color:var(--slate);line-height:1.7;padding:16px;background:var(--cream);border-radius:var(--r-md);margin-bottom:20px;border-left:3px solid var(--gold)}
.links{display:flex;flex-direction:column;gap:10px}
.link-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;border-radius:var(--r-md);font-size:14px;font-weight:600;transition:all .25s}
.link-btn.online{background:var(--midnight);color:#fff}
.link-btn.online:hover{background:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow-gold)}
.link-btn.offline{background:var(--cream);color:var(--midnight);border:1px solid rgba(15,23,42,.1)}
.link-btn.offline:hover{border-color:var(--gold);transform:translateY(-2px)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .5s ease}
.empty-state{text-align:center;padding:80px 20px;color:var(--slate)}
.empty-state i{font-size:48px;color:var(--muted);margin-bottom:16px;display:block}
.empty-state p{font-size:15px}

/* REVEAL ANIMATION */
.reveal{opacity:1;transform:translateY(30px);transition:transform .6s ease}
.reveal.visible{opacity:1;transform:none}

/* FOOTER */
.site-footer{background:var(--midnight);padding:48px 48px 32px;margin-top:80px;position:relative}
.site-footer::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.footer-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:48px}
.footer-brand{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.footer-brand-icon{width:44px;height:44px;background:rgba(212,168,83,.15);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--gold)}
.footer-brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#fff}
.footer-brand-name span{display:block;font-size:11px;color:rgba(255,255,255,.4);font-weight:400;font-family:'Noto Sans SC'}
.footer-desc{font-size:14px;color:rgba(255,255,255,.5);line-height:1.7;max-width:360px}
.footer-col h4{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.footer-col a{display:block;font-size:14px;color:rgba(255,255,255,.6);padding:6px 0;transition:color .25s}
.footer-col a:hover{color:var(--gold)}
.footer-bottom{max-width:1280px;margin:40px auto 0;padding-top:24px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center}
.footer-copy{font-size:13px;color:rgba(255,255,255,.35)}

/* ==================== 知识图谱增强样式 ==================== */
.graph-page{max-width:100%;padding:60px 0 80px}
.graph-page-header{max-width:1280px;margin:0 auto 32px;padding:0 48px;display:flex;align-items:center;justify-content:space-between}
.graph-page-header h2{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--midnight)}
.graph-page-header .sub{font-size:14px;color:var(--slate);margin-top:4px}
.graph-layout{display:flex;gap:24px;max-width:1280px;margin:0 auto;padding:0 48px}

/* 筛选面板 */
.filter-panel{width:260px;flex-shrink:0;background:#fff;border-radius:var(--r-lg);border:1px solid rgba(15,23,42,.06);overflow:hidden;height:fit-content;position:sticky;top:96px}
.filter-section{padding:20px;border-bottom:1px solid rgba(15,23,42,.06)}
.filter-section:last-child{border-bottom:none}
.filter-title{font-size:12px;font-weight:600;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.filter-title i{font-size:10px}
.filter-colleges{displaY:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.filter-college{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r);cursor:pointer;transition:all .2s;border:1px solid transparent}
.filter-college:hover{background:rgba(15,23,42,.04)}
.filter-college.active{background:rgba(15,23,42,.06);border-color:rgba(15,23,42,.1)}
.filter-checkbox{width:18px;height:18px;border-radius:4px;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.filter-college.active .filter-checkbox{background:var(--gold);border-color:var(--gold)}
.filter-checkbox i{font-size:10px;color:#fff;opacity:0;transition:opacity .2s}
.filter-college.active .filter-checkbox i{opacity:1}
.filter-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.filter-name{font-size:13px;color:var(--charcoal);flex:1}
.filter-count{font-size:11px;color:var(--muted);background:rgba(15,23,42,.06);padding:2px 6px;border-radius:10px}
.filter-actions{display:flex;gap:8px;padding:16px 20px;border-top:1px solid rgba(15,23,42,.06)}
.filter-btn{flex:1;padding:8px 12px;border-radius:var(--r);font-size:12px;font-weight:600;transition:all .2s}
.filter-btn.select-all{background:var(--cream);color:var(--midnight);border:1px solid rgba(15,23,42,.1)}
.filter-btn.select-all:hover{background:var(--midnight);color:#fff}
.filter-btn.clear{background:var(--cream);color:var(--slate);border:1px solid rgba(15,23,42,.1)}
.filter-btn.clear:hover{background:#fee2e2;color:#dc2626;border-color:#fecaca}

/* 统计面板 */
.stats-panel{background:#fff;border-radius:var(--r-lg);border:1px solid rgba(15,23,42,.06);padding:20px;margin-top:16px}
.stats-title{font-size:12px;font-weight:600;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{text-align:center;padding:12px 8px;border-radius:var(--r);background:var(--cream)}
.stat-card .num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--midnight)}
.stat-card .label{font-size:11px;color:var(--slate);margin-top:2px}
.stats-bar{background:#fff;border-radius:var(--r-lg);border:1px solid rgba(15,23,42,.06);padding:20px;margin-top:16px}
.stats-bar-title{font-size:12px;font-weight:600;color:var(--midnight);margin-bottom:12px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-item{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--slate);width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:var(--cream);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-value{font-size:11px;color:var(--muted);width:36px;text-align:right}

/* 图谱容器 */
.graph-container{flex:1;min-width:0;background:var(--midnight);border-radius:var(--r-lg);overflow:hidden;position:relative;height:calc(100vh - 200px);min-height:500px}
.graph-container svg{width:100%;height:100%}
.graph-controls{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;gap:8px}
.graph-control-btn{width:40px;height:40px;background:rgba(255,255,255,.1);border:none;border-radius:var(--r);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.graph-control-btn:hover{background:rgba(255,255,255,.2)}
.graph-legend{position:absolute;bottom:16px;left:16px;display:flex;gap:16px;background:rgba(15,23,42,.8);padding:12px 20px;border-radius:var(--r);backdrop-filter:blur(8px)}
.graph-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#fff}
.graph-legend-dot{width:10px;height:10px;border-radius:50%}
.graph-tooltip{position:absolute;background:rgba(15,23,42,.95);color:#fff;padding:12px 16px;border-radius:var(--r);font-size:12px;pointer-events:none;opacity:0;transition:opacity .2s;border:1px solid rgba(212,168,83,.3);max-width:200px;z-index:100}
.graph-tooltip .tip-name{font-weight:600;margin-bottom:4px}
.graph-tooltip .tip-meta{font-size:11px;color:rgba(255,255,255,.6)}
.graph-node-label{font-family:'Noto Sans SC',sans-serif;font-size:10px;fill:#fff;pointer-events:none;text-anchor:middle}
.graph-link{stroke-width:1.5;transition:opacity .3s}
.graph-link.dimmed{opacity:0.05}
.graph-node-circle{transition:all .3s}
.graph-node-circle.dimmed{opacity:0.15}
.graph-node-circle.highlighted{stroke:#fff;stroke-width:3px;filter:drop-shadow(0 0 8px currentColor)}

/* 关键词搜索 */
.keyword-search{padding:20px;border-bottom:1px solid rgba(15,23,42,.06)}
.keyword-input{width:100%;padding:10px 14px;border:1.5px solid rgba(15,23,42,.1);border-radius:var(--r);font-size:13px;outline:none;transition:border-color .2s}
.keyword-input:focus{border-color:var(--gold)}
.keyword-input::placeholder{color:var(--muted)}
</style>
</head>

<script>
// 学院配色方案
const COLLEGE_COLORS = [
  '#1a73e8', // 数字技术 - 蓝色
  '#8b5cf6', // 人工智能 - 紫色
  '#10b981', // 网络安全 - 绿色
  '#f59e0b', // 数字经济 - 橙色
  '#06b6d4', // 低空经济 - 青色
  '#ef4444', // 智能制造 - 红色
  '#eab308', // 智慧能源 - 黄色
  '#ec4899', // 智慧文旅 - 粉色
  '#14b8a6', // 智慧康养 - 青绿色
];

const API = '/api';
const ICONS = ['fa-solid fa-laptop','fa-solid fa-robot','fa-solid fa-shield','fa-solid fa-chart-line','fa-solid fa-plane','fa-solid fa-gears','fa-solid fa-bolt','fa-solid fa-masks-theater','fa-solid fa-heart','fa-solid fa-briefcase'];
const ICON_CLS = ['b1','b2','b3','b4','b5','b6','b7','b8','b9','b10'];
let state = { v:'home', colleges:[], college:null, major:null, majorId:null, collegeId:null, totalColleges:0, totalMajors:0, totalCourses:0 };
// 图谱状态
let graphState = {
  nodes: [],
  links: [],
  allNodes: [],
  allLinks: [],
  selectedColleges: new Set(),
  keyword: '',
  simulation: null,
  svg: null,
  g: null,
  nodeElements: null,
  linkElements: null
};

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
async function api(url){ const r=await fetch(API+url); if(!r.ok) throw new Error(r.statusText); return r.json(); }

function render(){
  const app = document.getElementById('app');
  if(state.v==='home') app.innerHTML=tplHome();
  else if(state.v==='colleges') app.innerHTML=tplColleges();
  else if(state.v==='majors') app.innerHTML=tplMajors();
  else if(state.v==='courses') app.innerHTML=tplCourses();
  else if(state.v==='graph') app.innerHTML=tplGraph();
}

function nav(v){ state.v=v; render();
  if(v==='home') loadHome();
  else if(v==='colleges') loadColleges();
  else if(v==='graph') loadGraph();
  document.getElementById('nav-home').className=v==='home'?'active':'';
  document.getElementById('nav-colleges').className=v==='colleges'?'active':'';
}

      <p class="hero-desc">覆盖全国优质产业学院，整合多元化专业课程资源，线上线下融合，助力学生高效学习与教师创新教学。</p>
      <div class="hero-stats">
        <div class="hero-stat">

          <div class="label">产业学院</div>

    <button onclick="doSearch(document.querySelector('.search-bar input').value)"><i class="fa-solid fa-search"></i> 搜索</button>
  </div>
</div>
<div class="page-main">
  <div class="page-section">
    <div class="section-header">
      <div class="section-title-group">
        <div class="section-label">Overview</div>
        <h2 class="section-title">产业学院</h2>
      </div>
      <a class="section-link" href="#" onclick="nav('colleges');return false">查看全部 <i class="fa-solid fa-arrow-right"></i></a>
    </div>

function tplColleges(){

  <div class="list-header">
    <button class="back-btn" onclick="nav('home')"><i class="fa-solid fa-arrow-left"></i> 返回首页</button>

// 知识图谱页面
function tplGraph(){
  return `<div class="graph-page fade-in">
  <div class="graph-page-header">
    <div>
      <button class="back-btn" onclick="nav('home')"><i class="fa-solid fa-arrow-left"></i> 返回首页</button>
      <h2 style="margin-top:16px">知识图谱</h2>
      <p class="sub">探索学院、专业与课程的关系网络</p>
    </div>
    <button class="btn" onclick="loadGraph()"><i class="fa-solid fa-refresh"></i> 刷新</button>
  </div>
  <div class="graph-layout">
    <!-- 筛选面板 -->
    <div class="filter-panel" id="filter-panel">
      <div class="filter-section">
        <div class="filter-title"><i class="fa-solid fa-filter"></i> 学院筛选</div>
        <div class="filter-colleges" id="filter-colleges"></div>
      </div>
      <div class="filter-section keyword-search">
        <div class="filter-title"><i class="fa-solid fa-search"></i> 关键词搜索</div>
        <input type="text" class="keyword-input" id="keyword-input" placeholder="输入课程名称..." oninput="onGraphKeyword(this.value)">
      </div>
      <div class="filter-actions">
        <button class="filter-btn select-all" onclick="selectAllColleges()">全选</button>
        <button class="filter-btn clear" onclick="clearFilters()">清除</button>
      </div>
    </div>

    <!-- 图谱容器 -->
    <div class="graph-container" id="graph-container">
      <svg id="graph-svg"></svg>
      <div class="graph-controls">
        <button class="graph-control-btn" onclick="zoomIn()" title="放大"><i class="fa-solid fa-plus"></i></button>
        <button class="graph-control-btn" onclick="zoomOut()" title="缩小"><i class="fa-solid fa-minus"></i></button>
        <button class="graph-control-btn" onclick="resetZoom()" title="重置"><i class="fa-solid fa-arrows-to-dot"></i></button>
      </div>
      <div class="graph-legend" id="graph-legend"></div>
      <div class="graph-tooltip" id="graph-tooltip">
        <div class="tip-name"></div>
        <div class="tip-meta"></div>
      </div>
    </div>
  </div>

  <!-- 统计面板 -->
  <div style="max-width:1280px;margin:24px auto 0;padding:0 48px">
    <div class="stats-panel">
      <div class="stats-title"><i class="fa-solid fa-chart-simple"></i> 数据概览</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="num" id="total-colleges">0</div>
          <div class="label">产业学院</div>
        </div>
        <div class="stat-card">
          <div class="num" id="total-majors">0</div>
          <div class="label">专业方向</div>
        </div>
        <div class="stat-card">
          <div class="num" id="total-courses">0</div>
          <div class="label">课程总数</div>
        </div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stats-bar-title">学院课程分布</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
  </div>
</div>`;
}

// 加载知识图谱
async function loadGraph(){
  const colleges = await api('/colleges');
  const allCourses = await api('/courses');

  // 保存学院数据用于筛选
  state.colleges = colleges;

  // 初始化选中所有学院
  graphState.selectedColleges = new Set(colleges.map(c => c.id));

  // 构建节点和链接
  const nodes = [];
  const links = [];
  const majorMap = {};

  // 添加学院节点
  colleges.forEach((c, i) => {
    nodes.push({
      id: 'college_'+c.id,
      name: c.name,
      type: 'college',
      count: c.course_count,
      collegeId: c.id,
      color: COLLEGE_COLORS[i % COLLEGE_COLORS.length]
    });
  });

  // 从课程中提取专业信息
  allCourses.forEach(co => {
    const majorKey = 'major_'+co.major_id;
    if(!majorMap[majorKey]){
      const collegeIndex = colleges.findIndex(c => c.id === co.college_id);
      majorMap[majorKey] = {
        id: co.major_id,
        name: co.major_name,
        college_id: co.college_id,
        collegeIndex: collegeIndex
      };
    }
  });

  // 添加专业节点
  Object.values(majorMap).forEach(m => {
    nodes.push({
      id: 'major_'+m.id,
      name: m.name,
      type: 'major',
      collegeId: m.college_id,
      collegeIndex: m.collegeIndex,
      color: COLLEGE_COLORS[m.collegeIndex % COLLEGE_COLORS.length]
    });
    links.push({source: 'college_'+m.college_id, target: 'major_'+m.id});
  });

  // 添加课程节点
  allCourses.forEach(co => {
    const collegeIndex = colleges.findIndex(c => c.id === co.college_id);
    nodes.push({
      id: 'course_'+co.id,
      name: co.name,
      type: 'course',
      majorId: co.major_id,
      collegeId: co.college_id,
      collegeIndex: collegeIndex,
      collegeName: co.college_name,
      majorName: co.major_name,
      color: COLLEGE_COLORS[collegeIndex % COLLEGE_COLORS.length]
    });
    links.push({source: 'major_'+co.major_id, target: 'course_'+co.id});
  });

  graphState.allNodes = nodes;
  graphState.allLinks = links;

  // 更新统计
  updateGraphStats(colleges, majorMap, allCourses);

  // 渲染筛选面板
  renderFilterPanel(colleges);

  // 渲染图谱
  renderGraph();
}

// 更新统计面板
function updateGraphStats(colleges, majors, courses){
  const uniqueCourses = new Set(courses.map(c => c.name));

  document.getElementById('total-colleges').textContent = colleges.length;
  document.getElementById('total-majors').textContent = Object.keys(majors).length;
  document.getElementById('total-courses').textContent = uniqueCourses.size;

  // 渲染柱状图
  const barChart = document.getElementById('bar-chart');
  const maxCount = Math.max(...colleges.map(c => c.course_count));

  barChart.innerHTML = colleges.map((c, i) => {
    const percent = (c.course_count / maxCount) * 100;
    return `<div class="bar-item">
      <div class="bar-label" title="${c.name}">${c.name.replace('产业学院','')}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${percent}%;background:${COLLEGE_COLORS[i % COLLEGE_COLORS.length]}"></div></div>
      <div class="bar-value">${c.course_count}</div>
    </div>`;
  }).join('');
}

// 渲染筛选面板
function renderFilterPanel(colleges){
  const container = document.getElementById('filter-colleges');
  if(!container) return;

  container.innerHTML = colleges.map((c, i) => `
    <div class="filter-college active" data-college-id="${c.id}" onclick="toggleCollegeFilter(${c.id})">
      <div class="filter-checkbox"><i class="fa-solid fa-check"></i></div>
      <div class="filter-color" style="background:${COLLEGE_COLORS[i % COLLEGE_COLORS.length]}"></div>
      <div class="filter-name">${e(c.name.replace('产业学院',''))}</div>
      <div class="filter-count">${c.course_count}</div>
    </div>
  `).join('');
}

// 切换学院筛选
function toggleCollegeFilter(collegeId){
  const el = document.querySelector(`[data-college-id="${collegeId}"]`);
  if(graphState.selectedColleges.has(collegeId)){
    graphState.selectedColleges.delete(collegeId);
    el.classList.remove('active');
  } else {
    graphState.selectedColleges.add(collegeId);
    el.classList.add('active');
  }
  applyFilters();
}

// 全选学院
function selectAllColleges(){
  graphState.selectedColleges = new Set(state.colleges.map(c => c.id));
  document.querySelectorAll('.filter-college').forEach(el => el.classList.add('active'));
  applyFilters();
}

// 清除筛选
function clearFilters(){
  graphState.selectedColleges.clear();
  graphState.keyword = '';
  document.getElementById('keyword-input').value = '';
  document.querySelectorAll('.filter-college').forEach(el => el.classList.remove('active'));
  applyFilters();
}

// 关键词搜索
function onGraphKeyword(value){
  graphState.keyword = value.toLowerCase().trim();
  applyFilters();
}

// 应用筛选
function applyFilters(){
  const selected = graphState.selectedColleges;
  const keyword = graphState.keyword;

  // 过滤节点
  graphState.nodes = graphState.allNodes.filter(node => {
    if(node.type === 'college'){
      return selected.has(node.collegeId);
    } else if(node.type === 'major'){
      return selected.has(node.collegeId);
    } else {
      return selected.has(node.collegeId) && (!keyword || node.name.toLowerCase().includes(keyword));
    }
  });

  // 过滤链接（只保留两端节点都在的链接）
  const nodeIds = new Set(graphState.nodes.map(n => n.id));
  graphState.links = graphState.allLinks.filter(link => {
    const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
    const targetId = typeof link.target === 'object' ? link.target.id : link.target;
    return nodeIds.has(sourceId) && nodeIds.has(targetId);
  });

  // 更新统计
  const collegeSet = new Set(graphState.nodes.filter(n => n.type === 'college').map(n => n.collegeId));
  const majorCount = graphState.nodes.filter(n => n.type === 'major').length;
  const courseCount = graphState.nodes.filter(n => n.type === 'course').length;

  document.getElementById('total-colleges').textContent = collegeSet.size;
  document.getElementById('total-majors').textContent = majorCount;
  document.getElementById('total-courses').textContent = courseCount;

  // 重新渲染图谱
  renderGraph();
}

// 渲染图谱
function renderGraph(){
  const container = document.getElementById('graph-container');
  if(!container) return;

  const width = container.clientWidth;
  const height = container.clientHeight || 600;

  // 清除旧图谱
  d3.select('#graph-svg').selectAll('*').remove();

  const svg = d3.select('#graph-svg')
    .attr('width', width)
    .attr('height', height);

  graphState.svg = svg;

  // 添加缩放功能
  const g = svg.append('g');
  graphState.g = g;

  svg.call(d3.zoom()
    .scaleExtent([0.2, 4])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    }));

  // 存储初始变换用于重置
  graphState.initialTransform = d3.zoomIdentity.translate(width/2, height/2).scale(0.8);
  svg.call(d3.zoom().transform, graphState.initialTransform);

  // 创建力导向模拟
  const simulation = d3.forceSimulation(graphState.nodes)
    .force('link', d3.forceLink(graphState.links).id(d => d.id).distance(d => d.source.type === 'college' ? 120 : 60))
    .force('charge', d3.forceManyBody().strength(d => d.type === 'college' ? -500 : d.type === 'major' ? -200 : -100))
    .force('center', d3.forceCenter(0, 0))
    .force('collision', d3.forceCollide().radius(d => d.type === 'college' ? 50 : d.type === 'major' ? 30 : 20));

  graphState.simulation = simulation;

  // 渲染链接
  const link = g.append('g')
    .selectAll('line')
    .data(graphState.links)
    .join('line')
    .attr('class', 'graph-link')
    .attr('stroke', d => {
      const sourceNode = graphState.nodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source));
      return sourceNode ? sourceNode.color : 'rgba(212,168,83,.3)';
    })
    .attr('stroke-opacity', 0.4);

  graphState.linkElements = link;

  // 渲染节点组
  const node = g.append('g')
    .selectAll('g')
    .data(graphState.nodes)
    .join('g')
    .attr('class', 'graph-node')
    .call(d3.drag()
      .on('start', (event, d) => {
        if(!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if(!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      }));

  graphState.nodeElements = node;

  // 节点大小
  const radius = d => d.type === 'college' ? 35 : d.type === 'major' ? 22 : 14;

  // 节点圆
  node.append('circle')
    .attr('class', 'graph-node-circle')
    .attr('r', d => radius(d))
    .attr('fill', d => d.color)
    .attr('stroke', '#fff')
    .attr('stroke-width', d => d.type === 'college' ? 3 : 2)
    .style('cursor', 'pointer')
    .on('click', (event, d) => {
      event.stopPropagation();
      handleNodeClick(d);
    })
    .on('mouseenter', (event, d) => showTooltip(event, d))
    .on('mouseleave', hideTooltip);

  // 节点标签（所有节点都显示名称）
  node.append('text')
    .attr('class', 'graph-node-label')
    .attr('dy', d => d.type === 'college' ? 48 : d.type === 'major' ? 32 : 20)
    .text(d => {
      if(d.type === 'college') return d.name.replace('产业学院','');
      if(d.type === 'major') return d.name.length > 5 ? d.name.substring(0,5) : d.name;
      if(d.type === 'course') return d.name.length > 6 ? d.name.substring(0,6) : d.name;
      return '';
    })
    .style('font-size', d => d.type === 'college' ? '11px' : d.type === 'major' ? '9px' : '8px')
    .style('font-weight', '600')
    .style('fill', '#fff')
    .style('text-anchor', 'middle')
    .style('pointer-events', 'none');

  // 动画更新
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // 渲染图例
  renderGraphLegend();
}

// 渲染图例
function renderGraphLegend(){
  const legend = document.getElementById('graph-legend');
  if(!legend) return;

  const colleges = state.colleges.slice(0, 5);
  legend.innerHTML = [
    { cls: 'college', label: '产业学院' },
    { cls: 'major', label: '专业方向' },
    { cls: 'course', label: '课程' }
  ].map(item => `
    <div class="graph-legend-item">
      <div class="graph-legend-dot" style="background:${item.cls === 'college' ? '#d4a853' : item.cls === 'major' ? '#3b82f6' : '#10b981'}"></div>
      ${item.label}
    </div>
  `).join('');
}

// 显示工具提示
function showTooltip(event, d){
  const tooltip = document.getElementById('graph-tooltip');
  const nameEl = tooltip.querySelector('.tip-name');
  const metaEl = tooltip.querySelector('.tip-meta');

  nameEl.textContent = d.name;

  if(d.type === 'college'){
    metaEl.textContent = `${d.count} 门课程`;
  } else if(d.type === 'major'){
    metaEl.textContent = d.collegeName || '专业方向';
  } else {
    metaEl.textContent = `${d.collegeName || ''} · ${d.majorName || ''}`;
  }

  const rect = document.getElementById('graph-container').getBoundingClientRect();
  tooltip.style.left = (event.clientX - rect.left + 10) + 'px';
  tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
  tooltip.style.opacity = '1';
}

// 隐藏工具提示
function hideTooltip(){
  document.getElementById('graph-tooltip').style.opacity = '0';
}

// 处理节点点击
function handleNodeClick(d){
  if(d.type === 'college'){
    goMajors(d.collegeId);
  } else if(d.type === 'course'){
    // 从 'course_123' 格式提取实际ID
    const courseId = parseInt(d.id.replace('course_', ''));
    openCourse(courseId);
  } else if(d.type === 'major'){
    // 高亮相关节点
    const relatedLinks = graphState.links.filter(l =>
      (typeof l.source === 'object' ? l.source.id : l.source) === d.id ||
      (typeof l.target === 'object' ? l.target.id : l.target) === d.id
    );
    const relatedNodeIds = new Set([d.id]);
    relatedLinks.forEach(l => {
      const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
      const targetId = typeof l.target === 'object' ? l.target.id : l.target;
      relatedNodeIds.add(sourceId);
      relatedNodeIds.add(targetId);
    });

    graphState.nodeElements.selectAll('circle')
      .classed('dimmed', n => !relatedNodeIds.has(n.id))
      .classed('highlighted', n => n.id === d.id);
    graphState.linkElements.classed('dimmed', l => {
      const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
      const targetId = typeof l.target === 'object' ? l.target.id : l.target;
      return sourceId !== d.id && targetId !== d.id;
    });
  }
}

// 缩放控制
function zoomIn(){
  graphState.svg.transition().call(d3.zoom().scaleBy, 1.3);
}

function zoomOut(){
  graphState.svg.transition().call(d3.zoom().scaleBy, 0.7);
}

function resetZoom(){
  graphState.svg.transition().duration(500).call(
    d3.zoom().transform,
    graphState.initialTransform
  );
  // 重置高亮
  graphState.nodeElements.selectAll('circle')
    .classed('dimmed', false)
    .classed('highlighted', false);
  graphState.linkElements.classed('dimmed', false);
}

  state.v='majors';
  state.collegeId=id;
  state.college=state.colleges.find(c=>c.id==id)||{name:'',major_count:0,course_count:0};
  state.majorId=null; state.major=null;
  render();
  await loadMajors();
}

async function goCourses(collegeId,majorId,majorName){
  const all=await api('/courses');
  const targetCollege=state.colleges.find(c=>c.id==collegeId)?.name;
  const targetMajor=decodeURIComponent(majorName);
  const filtered=all.filter(c=>c.college_name===targetCollege&&c.major_name===targetMajor);

  state.v='courses';
  state.collegeId=collegeId; state.majorId=majorId;
  state.major={name:decodeURIComponent(majorName),course_count:filtered.length};
  render();

  const list=document.getElementById('cl');
  if(list){
    if(!filtered.length){
      list.innerHTML='<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>暂无课程</p></div>'; return;
    }
    list.innerHTML=filtered.map((c,i)=>`
      <div class="course-item reveal" onclick="openCourse(${c.id})">
        <div class="c-num">${i+1}</div>
        <div class="c-info">
          <h4>${e(c.name)}</h4>
          <div class="c-meta"><span><i class="fa-solid fa-building-columns"></i> ${e(c.college_name||'')}</span></div>
        </div>
        <div class="c-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </div>`).join('');
    initRevealObserver();
  }
}

async function doSearch(q){
  if(!q.trim()){ nav('home'); return; }
  const ql=q.toLowerCase();
  const colleges=await api('/colleges');
  const allCourses=await api('/courses');

  const matchedColleges=colleges.filter(c=>c.name.toLowerCase().includes(ql));
  const matchedCourses=allCourses.filter(c=>c.name.toLowerCase().includes(ql));

  if(matchedColleges.length>0 && matchedCourses.length===0){
    state.v='colleges';
    state.colleges=matchedColleges;
    state.totalColleges=matchedColleges.length;
    state.totalMajors=matchedColleges.reduce((s,c)=>s+(c.major_count||0),0);
    render();
    const grid=document.getElementById('cg');
    if(grid) grid.innerHTML=matchedColleges.map((c,i)=>`
      <div class="college-card reveal" onclick="goMajors(${c.id})">

          <span class="c-tag"><strong>${c.course_count}</strong> 门课程</span>
          <div class="c-arrow"><i class="fa-solid fa-arrow-right"></i></div>
        </div>

    initRevealObserver();

  const list=document.getElementById('cl');
  if(list){
    if(!matchedCourses.length){
      list.innerHTML='<div class="empty-state"><i class="fa-solid fa-search"></i><p>未找到相关课程</p></div>'; return;
    }
    list.innerHTML=matchedCourses.map((c,i)=>`
      <div class="course-item reveal" onclick="openCourse(${c.id})">
        <div class="c-num">${i+1}</div>
        <div class="c-info">

        </div>
        <div class="c-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </div>`).join('');
    initRevealObserver();
  }
}

let observer = null;
function initRevealObserver(){
  if(observer) observer.disconnect();
  const els = document.querySelectorAll('.reveal');
  observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, {threshold:0.1, rootMargin:'0px 0px -50px 0px'});
  els.forEach(el=>{
    const rect = el.getBoundingClientRect();
    if(rect.top < window.innerHeight && rect.bottom > 0){
      el.classList.add('visible');
    } else {
      observer.observe(el);
    }
  });
}

document.addEventListener('mousemove',e=>{
  const hero = document.querySelector('.hero-visual');
  if(!hero) return;
  const rect = hero.getBoundingClientRect();
  if(rect.width===0) return;
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const dx = (e.clientX - cx) / 50;
  const dy = (e.clientY - cy) / 50;
  hero.style.transform = `translate(${dx}px, ${dy}px)`;
});
